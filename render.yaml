# Render Blueprint for FlySwarm.
# A SINGLE free web service runs everything in one process: the Telegram bot, the
# periodic scan/notify scheduler, AND the demo landing page + /health bound on
# $PORT (served from apps/demo-landing via scripts.run_flyswarm). One URL hosts
# both the public page and the live bot.
#
# Secrets (sync: false) must be set in the Render dashboard, NOT committed.
#
# NOTE on persistence: the free plan's disk is ephemeral, so monitored criteria
# and waitlist emails reset on restart/redeploy. For durable storage, swap to
# Postgres — set SWARM_STORAGE_BACKEND=postgres + DATABASE_URL (Supabase/Neon free
# tier). The storage layer is config-swappable, so no code changes are needed.

services:
  - type: web
    name: flyswarm
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python -m scripts.run_flyswarm
    envVars:
      - key: PYTHONPATH
        value: "."
      - key: SCAN_INTERVAL_SECONDS
        value: "21600"
      - key: OPENAI_API_KEY
        sync: false
      - key: TRAVELPAYOUTS_API_KEY
        sync: false
      - key: TRAVELPAYOUTS_MARKER
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
