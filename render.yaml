# Render Blueprint for FlySwarm.
# A SINGLE free web service runs everything in one process: the Telegram bot, the
# periodic scan/notify scheduler, AND the demo landing page + /health bound on
# $PORT (served from apps/demo-landing via scripts.run_flyswarm). One URL hosts
# both the public page and the live bot.
#
# Secrets (sync: false) must be set in the Render dashboard, NOT committed.
#
# PERSISTENCE: storage is set to Postgres (durable) below. DATABASE_URL is a
# secret (sync: false) — you MUST set it in the Render dashboard (the Supabase
# Session-pooler URI) before the first deploy, or boot fails fast with
# "Postgres backend selected but DATABASE_URL is not set". To fall back to the
# (ephemeral) free-disk SQLite, set SWARM_STORAGE_BACKEND=sqlite instead.
# Note: waitlist emails (demo-landing) still use the ephemeral local file.

services:
  - type: web
    name: flyswarm
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python -m scripts.run_flyswarm
    envVars:
      - key: PYTHONPATH
        value: "."
      - key: SCAN_INTERVAL_SECONDS
        value: "21600"
      - key: SWARM_STORAGE_BACKEND
        value: "postgres"
      - key: DATABASE_URL
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: TRAVELPAYOUTS_API_KEY
        sync: false
      - key: TRAVELPAYOUTS_MARKER
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
