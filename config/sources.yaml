# ─── FlySwarm flight-source routing (committed, NON-SECRET) ───────────────────
# Selection & tunables only. API tokens / affiliate markers live in `.env`
# (git-ignored). A factory turns each source entry into a concrete adapter;
# callers stay vendor-neutral and depend only on the FlightSource contract.
#
# Override the active source at runtime with the `FLIGHT_SOURCE` env var.
# Project currency default is USD (do NOT inherit a vendor default like RUB).

default_source: travelpayouts

# Multi-source composition. mode: merge | failover | single.
#   merge    — query ALL listed sources per route, record both (source-tagged),
#              judge the cheapest. ~1 API call PER source per route.
#   failover — try in order; use the first that returns offers.
#   single   — ignore this block; use default_source / FLIGHT_SOURCE.
# A listed source whose credentials are absent is skipped automatically, so this
# is safe to ship before Amadeus creds exist (Travelpayouts-only until then).
# Setting the FLIGHT_SOURCE env var forces single-source mode (overrides this).
composition:
  mode: merge
  sources: [travelpayouts, amadeus]

sources:
  travelpayouts:
    base_url: https://api.travelpayouts.com
    currency: USD
    options:
      # "cheapest tickets" endpoint; cache-based, ~300 req/min (confirm in dashboard)
      endpoint: v1/prices/cheap
      timeout_seconds: 20
  amadeus:
    # Self-service TEST environment. Switch to https://api.amadeus.com for prod.
    base_url: https://test.api.amadeus.com
    currency: USD
    options:
      timeout_seconds: 20
      # Amadeus requires a departure date; synthesize this many days out when the
      # query has none (harvest/seed routes).
      days_ahead: 30
      max_offers: 5
